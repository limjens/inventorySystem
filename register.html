<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>FlowStock · Create Account</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Font Awesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  
  <!-- Custom CSS (same as login page - reusable) -->
  <link rel="stylesheet" href="customcss.css">
</head>
<body class="relative flex items-center justify-center min-h-screen p-4">

  <!-- BACKGROUND IMAGE with overlay (matching login page) -->
  <div class="bg-image-container">
    <img src="https://images.pexels.com/photos/4483610/pexels-photo-4483610.jpeg?auto=compress&cs=tinysrgb&w=1600&h=900&fit=crop" 
         alt="inventory warehouse background" 
         class="bg-image">
    <div class="dark-overlay"></div>
    <div class="gradient-overlay"></div>
  </div>

  <!-- MAIN REGISTER CARD -->
  <div class="w-full max-w-md relative z-10">
    <div class="glass-card p-6 md:p-8">
      
      <!-- FlowStock Branding -->
      <div class="flex flex-col items-center text-center mb-6">
        <div class="flex items-center justify-center gap-3 mb-2">
          <i class="fas fa-boxes-stacked text-4xl text-white drop-shadow-lg"></i>
          <h1 class="text-4xl font-extrabold tracking-tight text-white">FlowStock</h1>
        </div>
        <div class="flex items-center gap-2 mt-1 backdrop-blur-sm bg-white/10 px-3 py-1 rounded-full">
          <i class="fas fa-user-plus text-white/80 text-[11px]"></i>
          <p class="text-white/90 text-xs font-medium tracking-wide">join the inventory revolution</p>
        </div>
      </div>
      
      <!-- Subtle divider -->
      <div class="text-center mt-1 mb-5">
        <div class="w-16 h-0.5 bg-white/40 mx-auto rounded-full"></div>
        <p class="text-white/80 text-sm font-medium mt-2 flex items-center justify-center gap-1">
          <i class="fas fa-shield-alt text-[10px]"></i> secure registration
        </p>
      </div>

      <!-- REGISTRATION FORM -->
      <div class="space-y-5">
        <!-- Username field -->
        <div class="relative input-wrapper">
          <i class="fas fa-user absolute left-4 top-1/2 transform -translate-y-1/2 text-white/80 input-icon"></i>
          <input type="text" 
                 id="regUsername" 
                 name="username"
                 placeholder="Choose a username" 
                 class="glass-input w-full py-3.5 pl-11 pr-4 text-white placeholder-white/70 font-medium text-base">
        </div>
        
        <!-- Password field -->
        <div class="relative input-wrapper">
          <i class="fas fa-lock absolute left-4 top-1/2 transform -translate-y-1/2 text-white/80 input-icon"></i>
          <input type="password" 
                 id="regPassword" 
                 name="password"
                 placeholder="Create a password" 
                 class="glass-input w-full py-3.5 pl-11 pr-4 text-white placeholder-white/70 font-medium text-base">
        </div>
        
        <!-- Confirm Password field (extra security) -->
        <div class="relative input-wrapper">
          <i class="fas fa-check-circle absolute left-4 top-1/2 transform -translate-y-1/2 text-white/80 input-icon"></i>
          <input type="password" 
                 id="confirmPassword" 
                 name="confirmPassword"
                 placeholder="Confirm your password" 
                 class="glass-input w-full py-3.5 pl-11 pr-4 text-white placeholder-white/70 font-medium text-base">
        </div>
        
        <!-- Terms & Conditions checkbox -->
        <div class="flex items-center gap-2 px-1">
          <input type="checkbox" id="termsCheckbox" class="custom-check rounded border-white/40">
          <label for="termsCheckbox" class="text-white/70 text-xs cursor-pointer">
            I agree to the <a href="#" class="text-white/90 hover:text-white underline">Terms of Service</a> and <a href="#" class="text-white/90 hover:text-white underline">Privacy Policy</a>
          </label>
        </div>
        
        <!-- REGISTER BUTTON - preserves onclick="register()" -->
        <button onclick="register()" class="btn-glass-register w-full py-3.5 rounded-2xl text-white font-bold text-base flex items-center justify-center gap-2 mt-2">
          <i class="fas fa-user-plus text-sm"></i>
          <span>Create Account</span>
        </button>
      </div>
      
      <!-- Login page link -->
      <div class="mt-8 text-center text-white/90 text-sm">
        <span class="opacity-80">Already have an account?</span>
        <a href="login.html" class="glass-link ml-2 font-semibold inline-flex items-center gap-1">
          Sign in <i class="fas fa-arrow-right text-xs"></i>
        </a>
      </div>
      
      <!-- Footer info -->
      <div class="mt-6 pt-3 text-center text-white/50 text-[11px] border-t border-white/20 flex justify-center gap-4">
        <span><i class="fas fa-lock mr-1"></i> Encrypted data</span>
        <span><i class="fas fa-database mr-1"></i> Free forever</span>
      </div>
    </div>
    
    <!-- Developer credit -->
    <div class="footer-glass mt-6 text-center">
      <i class="fas fa-code text-indigo-200 text-xs"></i>
      <span>Made with <i class="fas fa-heart text-rose-300 mx-0.5 text-[11px]"></i> by <span class="font-semibold text-white">Ashley</span></span>
      <span class="mx-0.5 opacity-50">•</span>
      <i class="fas fa-map-marker-alt text-emerald-300 text-[11px]"></i>
      <span class="text-white/90">Global</span>
      <span class="mx-0.5 opacity-50">•</span>
      <span>© 2025 FlowStock</span>
    </div>
  </div>

  <!-- External auth.js (your existing register logic) -->
  <script src="js/auth.js"></script>
  
  <!-- External animations.js (same as login page - reusable) -->
  <script src="animations.js"></script>
  
  <!-- Additional register-specific animations -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Password match validation (visual feedback)
      const passwordInput = document.getElementById('regPassword');
      const confirmInput = document.getElementById('confirmPassword');
      
      if (confirmInput) {
        confirmInput.addEventListener('blur', function() {
          if (passwordInput.value !== this.value && this.value !== '') {
            this.style.borderColor = 'rgba(255, 100, 100, 0.8)';
            if (window.showToast) {
              window.showToast('Passwords do not match!', 'error');
            }
          } else if (this.value !== '') {
            this.style.borderColor = 'rgba(100, 255, 100, 0.6)';
            setTimeout(() => {
              this.style.borderColor = 'rgba(255, 255, 255, 0.35)';
            }, 1500);
          }
        });
      }
      
      // Terms checkbox requirement hint
      const registerBtn = document.querySelector('.btn-glass-register');
      const termsCheck = document.getElementById('termsCheckbox');
      
      if (registerBtn && termsCheck) {
        registerBtn.addEventListener('click', function(e) {
          if (!termsCheck.checked) {
            e.preventDefault();
            if (window.showToast) {
              window.showToast('Please accept the Terms of Service', 'warning');
            }
            termsCheck.style.transform = 'scale(1.1)';
            setTimeout(() => {
              termsCheck.style.transform = 'scale(1)';
            }, 200);
          }
        });
      }
    });
  </script>
</body>
</html>
