<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Inventory System</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome for icons (lightweight, enhances visual) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="flex items-center justify-center min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 p-4">

  <div class="w-full max-w-md">
    <!-- Register Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
      <!-- Icon -->
      <div class="flex justify-center mb-4">
        <div class="bg-green-100 p-3 rounded-full">
          <i class="fas fa-user-plus text-green-600 text-2xl"></i>
        </div>
      </div>
      
      <h2 class="text-2xl font-bold mb-2 text-center text-gray-800">Create Account</h2>
      <p class="text-center text-gray-500 text-sm mb-6">Join the inventory system</p>

      <!-- Registration Fields -->
      <div class="space-y-3">
        <div class="relative">
          <i class="fas fa-user absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-sm"></i>
          <input id="regUsername" placeholder="Username"
            class="border border-gray-300 p-2.5 pl-10 w-full rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent transition">
        </div>
        
        <div class="relative">
          <i class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 text-sm"></i>
          <input id="regPassword" type="password" placeholder="Password"
            class="border border-gray-300 p-2.5 pl-10 w-full rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-transparent transition">
        </div>
        
        <button onclick="register()"
          class="bg-green-600 hover:bg-green-700 text-white font-semibold w-full py-2.5 rounded-lg transition duration-200 shadow-md hover:shadow-lg flex items-center justify-center gap-2">
          <i class="fas fa-check-circle"></i> Register
        </button>
      </div>

      <p class="mt-5 text-sm text-center text-gray-600">
        Already have an account?
        <a href="login.html" class="text-green-600 hover:text-green-800 font-medium transition">Login</a>
      </p>
    </div>

    <div class="mt-6 text-center">
      <p class="text-gray-500 text-xs sm:text-sm flex items-center justify-center gap-1 flex-wrap">
        <i class="fas fa-code text-green-500"></i>
        Made with <i class="fas fa-heart text-red-400 mx-1 text-xs"></i> by 
        <span class="font-semibold text-gray-700">Ashley</span>
        <span class="mx-1">•</span>
        <i class="fas fa-map-marker-alt text-orange-500 text-xs"></i>
      
      </p>
      <p class="text-gray-400 text-xs mt-1">© 2025 Inventory System</p>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
